<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            line-height: 1.6;
        }
        h1 {
            font-size: 18px;
            margin-bottom: 20px;
        }
        h2 {
            font-size: 14px;
            margin-top: 20px;
            margin-bottom: 10px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }
        .job-title {
            font-weight: bold;
        }
        .company {
            font-style: italic;
        }
        .period {
            color: #666;
        }
        .location {
            color: #666;
        }
        .note {
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>匿名履歷</h1>
    
    <h2>工作經歷</h2>
    
    <div class="job">
        <div class="job-title">平面設計師</div>
        <div class="company">展覽設計公司</div>
        <div class="period">2018 年 4 月 - 至今 (8 年)</div>
        <div class="location">台灣地區</div>
    </div>
    
    <div class="note">
        <strong>備註</strong><br>
        • 原始履歷已移除個人身份識別信息（姓名、聯絡方式、LinkedIn連結）<br>
        • 保留核心職業信息供評估參考
    </div>
</body>
</html>
